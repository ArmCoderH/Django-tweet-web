{% extends "layout.html" %}

{% block title %}Delete Tweet{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card shadow-lg text-center p-4" style="max-width:500px; width:100%; border-radius:15px;">

        <div class="mb-3">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:60px;"></i>
        </div>

        <h2 class="fw-bold text-danger">Delete Tweet?</h2>

        <p class="text-muted mt-3">
            Are you sure you want to delete this tweet?
            <br>
            <strong>This action cannot be undone.</strong>
        </p>

        <form method="post" class="mt-4">
            {% csrf_token %}

            <div class="d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-danger px-4">
                    🗑 Delete
                </button>

                <a href="{% url 'tweet_list' %}" class="btn btn-outline-secondary px-4">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
